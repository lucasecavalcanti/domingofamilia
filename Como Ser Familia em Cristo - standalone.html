ize:13.5px; line-height:1.55;\n    color:var(--c-deep);\n    font-style:italic;\n    font-family:var(--t-display);\n  }\n  .profile-chevron{\n    margin-left:auto;\n    color:var(--c-mid);\n    transition:transform .3s;\n  }\n  .profile-card.selected .profile-chevron{ transform:rotate(180deg);}\n\n  /* Timeline (screen 2) */\n  .timeline{\n    margin:18px -4px;\n    padding:18px 12px 24px;\n    background:var(--c-white);\n    border:1px solid var(--c-line);\n    border-radius:var(--r-md);\n    overflow-x:auto;\n    -webkit-overflow-scrolling:touch;\n  }\n  .timeline-track{\n    display:flex; align-items:center; gap:0;\n    min-width:max-content;\n    position:relative;\n  }\n  .tl-node{\n    display:flex; flex-direction:column; align-items:center;\n    gap:8px;\n    min-width:66px;\n    position:relative;\n  }\n  .tl-dot{\n    width:10px; height:10px; border-radius:50%;\n    background:var(--c-soft);\n    border:2px solid var(--c-white);\n    box-shadow:0 0 0 1.5px var(--c-soft);\n    z-index:2;\n  }\n  .tl-node.you .tl-dot{\n    background:var(--c-deep);\n    box-shadow:0 0 0 1.5px var(--c-deep), 0 0 0 6px rgba(38,33,92,.15);\n    width:14px; height:14px;\n  }\n  .tl-label{\n    font-size:11px; font-weight:600;\n    color:var(--c-deep);\n    white-space:nowrap;\n  }\n  .tl-node.you .tl-label{ color:var(--c-deep); font-weight:700;}\n  .tl-line{\n    position:absolute;\n    top:13px; left:50%;\n    width:100%; height:1.5px;\n    background:var(--c-line-strong);\n    z-index:1;\n  }\n  .tl-node:last-child .tl-line{display:none;}\n\n  /* Side-by-side cards */\n  .compare{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:16px 0;}\n  .compare-card{\n    padding:14px 12px;\n    border-radius:var(--r-md);\n    border:1px solid var(--c-line);\n    background:var(--c-white);\n  }\n  .compare-card.universal{\n    background:var(--c-deep); color:var(--c-lilac);\n    border:none;\n  }\n  .compare-card.local{\n    background:var(--c-lilac); color:var(--c-deep);\n    border:none;\n  }\n  .compare-label{\n    font-size:10px; letter-spacing:.16em; text-transform:uppercase;\n    font-weight:700; margin-bottom:6px; opacity:.7;\n  }\n  .compare-title{\n    font-family:var(--t-display);\n    font-size:18px; font-weight:500; line-height:1.1;\n    margin-bottom:10px;\n  }\n  .compare-body{ font-size:12.5px; line-height:1.45;}\n\n  /* Slider */\n  .slider-wrap{\n    background:var(--c-white);\n    border:1px solid var(--c-line);\n    border-radius:var(--r-md);\n    padding:18px 16px;\n    margin:16px 0;\n  }\n  .slider-question{\n    font-size:14px; color:var(--c-ink); margin-bottom:18px;\n    font-weight:500; line-height:1.4;\n  }\n  .slider-rail{\n    position:relative;\n    height:44px;\n    display:flex; align-items:center;\n    margin-bottom:14px;\n  }\n  .slider-track{\n    position:absolute; left:8px; right:8px; height:4px;\n    background:var(--c-line); border-radius:99px;\n  }\n  .slider-fill{\n    position:absolute; left:8px; height:4px;\n    background:var(--c-mid); border-radius:99px;\n    transition:width .25s;\n  }\n  .slider-steps{\n    position:absolute; left:0; right:0;\n    display:flex; justify-content:space-between;\n    align-items:center;\n  }\n  .slider-step{\n    width:14px; height:14px; border-radius:50%;\n    background:var(--c-white);\n    border:2px solid var(--c-line-strong);\n    cursor:pointer;\n    position:relative; z-index:2;\n    transition:all .2s;\n  }\n  .slider-step.active{\n    background:var(--c-deep);\n    border-color:var(--c-deep);\n    transform:scale(1.25);\n  }\n  .slider-step.passed{\n    background:var(--c-mid);\n    border-color:var(--c-mid);\n  }\n  .slider-labels{\n    display:flex; justify-content:space-between;\n    font-size:11px; color:var(--c-muted); font-weight:500;\n    margin-top:4px;\n  }\n  .slider-feedback{\n    margin-top:14px;\n    padding:12px 14px;\n    background:var(--c-lilac);\n    border-radius:var(--r-sm);\n    font-size:13.5px; line-height:1.5;\n    color:#2A2750;\n    min-height:62px;\n    transition:opacity .3s;\n  }\n\n  /* Panelinhas (screen 6) */\n  .twoside{display:grid; grid-template-columns:1fr; gap:12px; margin:16px 0;}\n  .side{\n    border-radius:var(--r-md);\n    padding:16px;\n  }\n  .side.healthy{\n    background:var(--c-lilac);\n    border:1px solid #C9C5F0;\n  }\n  .side.toxic{\n    background:#FCF0EC;\n    border:1px solid #F0D4C8;\n  }\n  .side-head{\n    display:flex; align-items:center; gap:10px;\n    margin-bottom:10px;\n  }\n  .side-title{\n    font-family:var(--t-display); font-size:18px; font-weight:500;\n    color:var(--c-deep);\n  }\n  .side.toxic .side-title{color:#7A3A22;}\n  .chip-cloud{display:flex; flex-wrap:wrap; gap:6px;}\n  .chip{\n    font-size:12px; padding:5px 10px; border-radius:99px;\n    background:rgba(255,255,255,.6);\n    color:var(--c-deep);\n    border:1px solid rgba(38,33,92,.1);\n    font-weight:500;\n  }\n  .side.toxic .chip{ color:#7A3A22; border-color:rgba(122,58,34,.15);}\n\n  /* Gesture list */\n  .gesture-list{display:flex; flex-direction:column; gap:8px; margin:14px 0;}\n  .gesture{\n    appearance:none; background:var(--c-white);\n    border:1px solid var(--c-line);\n    border-radius:var(--r-sm);\n    padding:13px 14px;\n    cursor:pointer;\n    font-family:inherit; font-size:14px; text-align:left;\n    display:flex; align-items:center; gap:12px;\n    color:var(--c-ink);\n    transition:all .2s;\n  }\n  .gesture:hover{border-color:var(--c-soft);}\n  .gesture.picked{\n    background:var(--c-lilac);\n    border-color:var(--c-mid);\n    color:var(--c-deep);\n    font-weight:500;\n  }\n  .gesture-mark{\n    width:18px; height:18px; border-radius:50%;\n    border:1.5px solid var(--c-line-strong);\n    display:grid; place-items:center;\n    flex-shrink:0;\n    transition:all .2s;\n  }\n  .gesture.picked .gesture-mark{\n    background:var(--c-mid); border-color:var(--c-mid);\n  }\n  .gesture-encourage{\n    padding:14px 16px; border-radius:var(--r-sm);\n    background:var(--c-deep); color:var(--c-lilac);\n    font-size:13.5px; line-height:1.5;\n    margin-top:10px;\n    font-family:var(--t-display);\n    font-style:italic;\n    display:none;\n    animation:fadeUp .3s ease;\n  }\n  .gesture-encourage.show{display:block;}\n\n  /* Inputs */\n  .field{\n    margin:12px 0;\n  }\n  .field-label{\n    display:block;\n    font-size:12px; font-weight:600;\n    letter-spacing:.06em; text-transform:uppercase;\n    color:var(--c-mid);\n    margin-bottom:6px;\n  }\n  .input, .select, .textarea{\n    width:100%;\n    padding:13px 14px;\n    border:1.5px solid var(--c-line);\n    border-radius:var(--r-sm);\n    font-family:inherit; font-size:15px;\n    color:var(--c-ink);\n    background:var(--c-white);\n    transition:border .2s, box-shadow .2s;\n  }\n  .input:focus, .select:focus, .textarea:focus{\n    outline:none;\n    border-color:var(--c-mid);\n    box-shadow:0 0 0 3px rgba(83,74,183,.15);\n  }\n  .textarea{ min-height:80px; resize:vertical; line-height:1.45;}\n  .select{\n    appearance:none;\n    background-image:url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1.5L6 6.5L11 1.5' stroke='%23534AB7' stroke-width='1.8' fill='none' stroke-linecap='round'/><\u002Fsvg>\");\n    background-repeat:no-repeat;\n    background-position:right 14px center;\n    padding-right:38px;\n  }\n  .inline-confirm{\n    display:flex; gap:8px; align-items:stretch;\n  }\n  .inline-confirm .input{flex:1;}\n  .btn-mini{\n    padding:0 16px; border-radius:var(--r-sm);\n    background:var(--c-deep); color:#fff;\n    border:none; cursor:pointer;\n    font-family:inherit; font-weight:600; font-size:14px;\n    transition:background .2s;\n  }\n  .btn-mini:hover{background:var(--c-mid);}\n\n  .heritage-msg{\n    margin-top:10px;\n    padding:14px;\n    background:var(--c-lilac);\n    border-radius:var(--r-sm);\n    font-family:var(--t-display);\n    font-size:15px; line-height:1.45;\n    color:var(--c-deep);\n    font-style:italic;\n    display:none;\n    animation:fadeUp .3s ease;\n  }\n  .heritage-msg.show{display:block;}\n\n  /* Passport card */\n  .passport{\n    background:linear-gradient(140deg, var(--c-deep) 0%, #1B1746 65%, #2C2570 100%);\n    color:var(--c-lilac);\n    border-radius:var(--r-lg);\n    padding:22px;\n    box-shadow:var(--shadow-lg);\n    margin:16px 0 18px;\n    position:relative;\n    overflow:hidden;\n  }\n  .passport::before{\n    content:''; position:absolute; right:-50px; top:-50px;\n    width:200px; height:200px;\n    background:radial-gradient(circle, rgba(127,119,221,.25), transparent 60%);\n    border-radius:50%;\n  }\n  .passport-header{\n    display:flex; align-items:center; justify-content:space-between;\n    margin-bottom:18px;\n    position:relative; z-index:1;\n  }\n  .passport-stamp{\n    font-family:var(--t-mono); font-size:9.5px;\n    letter-spacing:.22em; text-transform:uppercase;\n    color:var(--c-soft);\n    border:1px solid rgba(127,119,221,.5);\n    padding:5px 9px; border-radius:4px;\n  }\n  .passport-title{\n    font-family:var(--t-display);\n    font-size:22px; font-weight:500;\n    color:var(--c-white);\n    line-height:1.05;\n    margin:0;\n  }\n  .passport-sub{\n    font-family:var(--t-mono); font-size:10px;\n    letter-spacing:.2em; text-transform:uppercase;\n    color:var(--c-soft);\n    margin-top:6px;\n  }\n  .passport-fields{\n    display:flex; flex-direction:column; gap:14px;\n    position:relative; z-index:1;\n  }\n  .passport-field-label{\n    font-family:var(--t-mono); font-size:10px;\n    letter-spacing:.18em; text-transform:uppercase;\n    color:var(--c-soft);\n    margin-bottom:5px;\n  }\n  .passport .input, .passport .select, .passport .textarea{\n    background:rgba(255,255,255,.06);\n    border:1px solid rgba(127,119,221,.3);\n    color:var(--c-white);\n    font-size:14px;\n    padding:10px 12px;\n  }\n  .passport .input::placeholder, .passport .textarea::placeholder{\n    color:rgba(238,237,254,.4);\n  }\n  .passport .input:focus, .passport .select:focus, .passport .textarea:focus{\n    border-color:var(--c-soft);\n    box-shadow:0 0 0 2px rgba(127,119,221,.25);\n  }\n  .passport .select{\n    background-image:url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1.5L6 6.5L11 1.5' stroke='%237F77DD' stroke-width='1.8' fill='none' stroke-linecap='round'/><\u002Fsvg>\");\n  }\n  .passport-footer{\n    margin-top:18px; padding-top:14px;\n    border-top:1px dashed rgba(127,119,221,.3);\n    font-size:12px; line-height:1.45;\n    color:rgba(238,237,254,.7);\n    position:relative; z-index:1;\n    font-style:italic;\n  }\n\n  /* Conclusion checklist */\n  .commit-list{display:flex; flex-direction:column; gap:8px; margin:14px 0 18px;}\n  .commit{\n    display:flex; gap:12px; align-items:flex-start;\n    padding:13px 14px;\n    background:var(--c-white);\n    border:1.5px solid var(--c-line);\n    border-radius:var(--r-md);\n    cursor:pointer;\n    transition:all .2s;\n    font-size:14px; line-height:1.4;\n    color:var(--c-ink);\n  }\n  .commit:hover{border-color:var(--c-soft);}\n  .commit.checked{\n    background:var(--c-lilac);\n    border-color:var(--c-mid);\n    color:var(--c-deep);\n  }\n  .checkbox{\n    width:22px; height:22px;\n    border:1.5px solid var(--c-line-strong);\n    border-radius:6px;\n    display:grid; place-items:center;\n    flex-shrink:0;\n    transition:all .2s;\n    background:var(--c-white);\n  }\n  .commit.checked .checkbox{\n    background:var(--c-deep); border-color:var(--c-deep);\n  }\n  .checkbox svg{\n    opacity:0;\n    transition:opacity .2s;\n    stroke-dasharray:20;\n    stroke-dashoffset:20;\n  }\n  .commit.checked .checkbox svg{\n    opacity:1;\n    animation:checkDraw .35s ease forwards;\n  }\n  @keyframes checkDraw{\n    to{stroke-dashoffset:0;}\n  }\n\n  /* Vertical timeline (screen 10) */\n  .vtl{\n    margin:18px 0;\n    position:relative;\n    padding-left:36px;\n  }\n  .vtl::before{\n    content:''; position:absolute;\n    top:8px; bottom:8px; left:14px;\n    width:1.5px; background:var(--c-line-strong);\n  }\n  .vtl-item{\n    position:relative;\n    padding-bottom:18px;\n  }\n  .vtl-item:last-child{padding-bottom:0;}\n  .vtl-num{\n    position:absolute; left:-36px; top:0;\n    width:30px; height:30px; border-radius:50%;\n    background:var(--c-white);\n    border:1.5px solid var(--c-mid);\n    color:var(--c-deep);\n    display:grid; place-items:center;\n    font-family:var(--t-mono); font-size:12px; font-weight:700;\n  }\n  .vtl-body{\n    font-size:14px; line-height:1.5; color:var(--c-ink);\n    padding-top:5px;\n  }\n  .vtl-body strong{color:var(--c-deep); font-weight:600;}\n\n  /* Quiz score */\n  .score-card{\n    background:linear-gradient(135deg, var(--c-mid), var(--c-deep));\n    color:var(--c-lilac);\n    border-radius:var(--r-lg);\n    padding:22px;\n    margin:18px 0;\n    text-align:center;\n    box-shadow:var(--shadow-md);\n  }\n  .score-number{\n    font-family:var(--t-display);\n    font-size:56px; font-weight:500;\n    color:var(--c-white);\n    line-height:1;\n    letter-spacing:-0.02em;\n  }\n  .score-label{\n    font-size:11px; letter-spacing:.18em; text-transform:uppercase;\n    color:var(--c-soft); margin:6px 0 14px; font-weight:600;\n  }\n  .score-msg{\n    font-size:14px; line-height:1.5;\n    color:rgba(238,237,254,.85);\n    font-style:italic;\n    font-family:var(--t-display);\n  }\n\n  /* Hero illustration (screen 1) */\n  .hero-art{\n    margin:8px -8px 24px;\n    aspect-ratio:1.35/1;\n    display:grid; place-items:center;\n  }\n  .hero-art svg{max-width:100%; height:auto;}\n\n  .pull-quote{\n    font-family:var(--t-display);\n    font-size:30px; line-height:1.18; font-weight:400;\n    color:var(--c-deep);\n    letter-spacing:-0.018em;\n    margin:18px 0;\n    text-wrap:balance;\n  }\n  .pull-quote .em{ color:var(--c-mid); font-style:italic;}\n\n  .divider{\n    height:1px; background:var(--c-line);\n    margin:20px 0;\n  }\n  .divider-fancy{\n    text-align:center; margin:22px 0;\n    color:var(--c-line-strong);\n    font-size:12px; letter-spacing:.4em;\n  }\n\n  /* Subtle scrollbar */\n  .screen::-webkit-scrollbar{width:0;}\n  .timeline::-webkit-scrollbar{height:0;}\n\n  /* Tiny shake animation for incorrect */\n  @keyframes shake{\n    0%,100%{transform:translateX(0);}\n    25%{transform:translateX(-4px);}\n    75%{transform:translateX(4px);}\n  }\n  .shake{animation:shake .3s ease;}\n\n  /* Tap card animation */\n  @keyframes pop{\n    0%{transform:scale(1);}\n    50%{transform:scale(1.02);}\n    100%{transform:scale(1);}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<div class=\"app\" id=\"app\">\n\n  <!-- TOP BAR -->\n  <header class=\"topbar\">\n    <div class=\"topbar-row\">\n      <div class=\"brand\">\n        <span class=\"brand-dot\"><\u002Fspan>\n        <span>Família em Cristo<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"step-count\"><b id=\"stepCur\">01<\u002Fb> / <span id=\"stepTot\">10<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"progress\"><div class=\"progress-fill\" id=\"progressFill\"><\u002Fdiv><\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- SCREENS -->\n  <main class=\"viewport\" id=\"viewport\">\n\n    <!-- SCREEN 1 — Abertura -->\n    <section class=\"screen active\" data-screen=\"1\">\n      <div class=\"eyebrow\">DOMINGO FAMÍLIA · 31 DE MAIO DE 2026<\u002Fdiv>\n      <h1 class=\"display\" style=\"text-align: center\">Você faz parte de uma Família.<\u002Fh1>\n      <p class=\"lede\" style=\"color: var(--c-mid); font-family: var(--t-display); font-style: italic; font-size: 18px; text-align: center; line-height: 1.25\">O que nos une não são as mesmas&nbsp;\ncrenças, mas o mesmo Cristo.\n\n<\u002Fp>\n\n      <div class=\"hero-art\" aria-hidden=\"true\">\n        <svg viewBox=\"0 0 320 240\" width=\"100%\">\n          <defs>\n            <radialGradient id=\"haloA\" cx=\"50%\" cy=\"55%\" r=\"50%\">\n              <stop offset=\"0%\" stop-color=\"#EEEDFE\"><\u002Fstop>\n              <stop offset=\"100%\" stop-color=\"#FAFAFC\" stop-opacity=\"0\"><\u002Fstop>\n            <\u002FradialGradient>\n          <\u002Fdefs>\n          <circle cx=\"160\" cy=\"135\" r=\"115\" fill=\"url(#haloA)\"><\u002Fcircle>\n          <!-- connecting threads -->\n          <g stroke=\"#7F77DD\" stroke-width=\"1\" fill=\"none\" opacity=\".55\">\n            <line x1=\"80\" y1=\"160\" x2=\"160\" y2=\"115\"><\u002Fline>\n            <line x1=\"160\" y1=\"115\" x2=\"240\" y2=\"160\"><\u002Fline>\n            <line x1=\"80\" y1=\"160\" x2=\"240\" y2=\"160\"><\u002Fline>\n            <line x1=\"160\" y1=\"115\" x2=\"120\" y2=\"60\"><\u002Fline>\n            <line x1=\"160\" y1=\"115\" x2=\"200\" y2=\"60\"><\u002Fline>\n            <line x1=\"120\" y1=\"60\" x2=\"200\" y2=\"60\"><\u002Fline>\n          <\u002Fg>\n          <!-- people nodes -->\n          <g>\n            <!-- top left -->\n            <circle cx=\"120\" cy=\"60\" r=\"14\" fill=\"#534AB7\"><\u002Fcircle>\n            <path d=\"M105 92 Q120 76 135 92 L135 100 L105 100 Z\" fill=\"#534AB7\"><\u002Fpath>\n            <!-- top right -->\n            <circle cx=\"200\" cy=\"60\" r=\"14\" fill=\"#26215C\"><\u002Fcircle>\n            <path d=\"M185 92 Q200 76 215 92 L215 100 L185 100 Z\" fill=\"#26215C\"><\u002Fpath>\n            <!-- center -->\n            <circle cx=\"160\" cy=\"115\" r=\"18\" fill=\"#26215C\"><\u002Fcircle>\n            <path d=\"M140 153 Q160 132 180 153 L180 168 L140 168 Z\" fill=\"#26215C\"><\u002Fpath>\n            <!-- bottom left -->\n            <circle cx=\"80\" cy=\"160\" r=\"14\" fill=\"#7F77DD\"><\u002Fcircle>\n            <path d=\"M65 192 Q80 176 95 192 L95 200 L65 200 Z\" fill=\"#7F77DD\"><\u002Fpath>\n            <!-- bottom right -->\n            <circle cx=\"240\" cy=\"160\" r=\"14\" fill=\"#7F77DD\"><\u002Fcircle>\n            <path d=\"M225 192 Q240 176 255 192 L255 200 L225 200 Z\" fill=\"#7F77DD\"><\u002Fpath>\n          <\u002Fg>\n        <\u002Fsvg>\n      <\u002Fdiv>\n\n      <div class=\"card-lilac\">\n        <p class=\"body-text\" style=\"margin: -7px; color: var(--c-deep); font-size: 15.5px; padding: 0px; border-width: 0px; border-style: solid; border-radius: 0px; letter-spacing: 0.3px; text-align: center; line-height: 1.25\">Não existe pessoa sem família.&nbsp;\nNão existe cristão sem Igreja.\nO que podemos discutir é a qualidade das relações.\n<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"divider-fancy\">· · ·<\u002Fdiv>\n      <p class=\"body-text-sm\" style=\"text-align: center; line-height: 1.35\">Um Guia Interativo do Sermão de Lucas Cavalcanti<br>Baseado em Hebreus 10.23-25 e 13.7.17<\u002Fp>\n    <\u002Fsection>\n\n    <!-- SCREEN 2 — Igreja -->\n    <section class=\"screen\" data-screen=\"2\">\n      <div class=\"eyebrow\">Capítulo 1<\u002Fdiv>\n      <h2 class=\"title\">Igreja — o que é isso, afinal?<\u002Fh2>\n      <p class=\"body-text\" style=\"text-align: justify\">No Novo Testamento, a palavra grega <em>éclésia<\u002Fem> aparece <strong>114 vezes<\u002Fstrong>. Não significa templo, denominação ou marca: significa <em>ajuntamento<\u002Fem>, <em>assembleia<\u002Fem>, <em>congregação<\u002Fem>.<\u002Fp>\n\n      <div class=\"timeline\" aria-label=\"Linha do tempo da Igreja atemporal\">\n        <div class=\"timeline-track\" style=\"align-items: center; text-align: center\">\n          <div class=\"tl-node\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-label\">Abraão<\u002Fdiv><div class=\"tl-line\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"tl-node\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-label\">Davi<\u002Fdiv><div class=\"tl-line\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"tl-node\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-label\">Ester<\u002Fdiv><div class=\"tl-line\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"tl-node\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-label\">Paulo<\u002Fdiv><div class=\"tl-line\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"tl-node\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-label\">Lutero<\u002Fdiv><div class=\"tl-line\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"tl-node\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-label\">Outros<\u002Fdiv><div class=\"tl-line\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"tl-node you\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-label\">Você<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"body-text\" style=\"text-align: justify\">Das 114 ocorrências, apenas 5 se referem à Igreja Universal Atemporal. As demais falam de comunidades locais — concretas, datadas, imperfeitas.<\u002Fp>\n\n      <div class=\"compare\">\n        <div class=\"compare-card universal\">\n          <div class=\"compare-label\">Atemporal<\u002Fdiv>\n          <div class=\"compare-title\">Igreja Universal<\u002Fdiv>\n          <div class=\"compare-body\" style=\"text-align: justify\">Toda tribo, raça e nação. Você entra pelo novo nascimento. Não tem CNPJ, nem endereço.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"compare-card local\">\n          <div class=\"compare-label\">Concreta<\u002Fdiv>\n          <div class=\"compare-title\">Igreja Local<\u002Fdiv>\n          <div class=\"compare-body\" style=\"text-align: justify\">Existe para este tempo e esta realidade. Tem estatuto, conflitos, pizza e enterro.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"margin-top:18px;\">\n        <h3 class=\"sub\">Pergunta<\u002Fh3>\n        <p class=\"body-text\" style=\"margin-bottom:14px;\">Quando Jesus diz em Mateus 18 <em>\"conta à igreja\"<\u002Fem>, sobre qual delas Ele está falando?<\u002Fp>\n        <div class=\"choices\" data-quiz=\"q2\">\n          <button class=\"choice\" data-correct=\"false\" data-fb=\"A Igreja Universal atemporal reúne pessoas de todos os tempos — seria impossível convocá-la para arbitrar um conflito interpessoal. Jesus está falando de algo mais próximo, palpável, do tipo que cabe numa sala.\">\n            <span class=\"bullet\">A<\u002Fspan><span>A Igreja Universal — toda tribo, raça e nação ao longo da história.<\u002Fspan>\n          <\u002Fbutton>\n          <button class=\"choice\" data-correct=\"true\" data-fb=\"Isso. Jesus fala da &lt;strong&gt;comunidade local&lt;/strong&gt;: a igreja em Éfeso, na casa de Filemon, ou a Família em Cristo aqui em São Luís. É o ajuntamento que se reúne, conhece o irmão pelo nome e pode efetivamente &lt;em&gt;conversar&lt;/em&gt; com ele.\">\n            <span class=\"bullet\">B<\u002Fspan><span>A comunidade local — gente que se reúne, se conhece, e pode chamar o irmão para conversar.<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"feedback\" data-fb-for=\"q2\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SCREEN 3 — 4 perfis -->\n    <section class=\"screen\" data-screen=\"3\">\n      <div class=\"eyebrow\">Capítulo 2<\u002Fdiv>\n      <h2 class=\"title\">Quatro perfis de participação<\u002Fh2>\n      <p class=\"body-text\" style=\"text-align: justify; padding: 0px\">Existem pelo menos quatro formas de fazer parte da Família em Cristo. Todas são bem-vindas. Cada uma carrega um peso diferente.<\u002Fp>\n\n      <div class=\"profile-grid\" id=\"profileGrid\">\n\n        <button class=\"profile-card\" data-tone=\"1\" data-profile=\"Membro\">\n          <div class=\"profile-head\">\n            <div class=\"profile-icon\">\n              <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\">\n                <path d=\"M12 2L3 7v6c0 5 4 8 9 9 5-1 9-4 9-9V7l-9-5z\"><\u002Fpath>\n                <path d=\"M9 12l2 2 4-4\"><\u002Fpath>\n              <\u002Fsvg>\n            <\u002Fdiv>\n            <div>\n              <div class=\"profile-name\">Membro<\u002Fdiv>\n              <div class=\"profile-tagline\">Pacto formal<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"profile-chevron\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M4 6l4 4 4-4\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"profile-summary\" style=\"text-align: justify\">Parte da instituição religiosa: CNPJ, estatuto, diretoria. Tem voz ativa e voto nas assembleias.<\u002Fp>\n          <div class=\"profile-detail\"><div class=\"profile-detail-inner\">\"Você carrega um pacto — não só com Deus, mas com essa comunidade específica.\"<\u002Fdiv><\u002Fdiv>\n        <\u002Fbutton>\n\n        <button class=\"profile-card\" data-tone=\"2\" data-profile=\"Frequentador\">\n          <div class=\"profile-head\">\n            <div class=\"profile-icon\">\n              <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\">\n                <circle cx=\"12\" cy=\"8\" r=\"3.5\"><\u002Fcircle>\n                <path d=\"M5 21c0-4 3-7 7-7s7 3 7 7\"><\u002Fpath>\n              <\u002Fsvg>\n            <\u002Fdiv>\n            <div>\n              <div class=\"profile-name\">Frequentador<\u002Fdiv>\n              <div class=\"profile-tagline\">Vida ativa, sem voto<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"profile-chevron\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M4 6l4 4 4-4\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"profile-summary\" style=\"text-align: justify\">Oferta, lidera ministérios, vive a comunhão. Sem vínculo administrativo: confia nos membros para decidir.<\u002Fp>\n          <div class=\"profile-detail\"><div class=\"profile-detail-inner\">\"Isso não te isenta de responsabilidades. A comunidade do Cristo ressurrecto é coisa séria — Paulo deixou claro em 1 Coríntios 5.\"<\u002Fdiv><\u002Fdiv>\n        <\u002Fbutton>\n\n        <button class=\"profile-card\" data-tone=\"3\" data-profile=\"Visitante\">\n          <div class=\"profile-head\">\n            <div class=\"profile-icon\">\n              <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\">\n                <path d=\"M3 11l9-7 9 7v9a1 1 0 01-1 1h-5v-6h-6v6H4a1 1 0 01-1-1v-9z\"><\u002Fpath>\n              <\u002Fsvg>\n            <\u002Fdiv>\n            <div>\n              <div class=\"profile-name\">Visitante<\u002Fdiv>\n              <div class=\"profile-tagline\">Está conhecendo<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"profile-chevron\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M4 6l4 4 4-4\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"profile-summary\" style=\"text-align: justify\">Está chegando agora. Uma família com qualidades e defeitos — como toda família real.<\u002Fp>\n          <div class=\"profile-detail\"><div class=\"profile-detail-inner\">\"Seja muito bem-vindo. A porta está aberta. O café também.\"<\u002Fdiv><\u002Fdiv>\n        <\u002Fbutton>\n\n        <button class=\"profile-card\" data-tone=\"4\" data-profile=\"Consumidor\">\n          <div class=\"profile-head\">\n            <div class=\"profile-icon\">\n              <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\">\n                <path d=\"M3 4h2l2.5 12h11L21 7H6\"><\u002Fpath>\n                <circle cx=\"9\" cy=\"20\" r=\"1.4\"><\u002Fcircle>\n                <circle cx=\"17\" cy=\"20\" r=\"1.4\"><\u002Fcircle>\n              <\u002Fsvg>\n            <\u002Fdiv>\n            <div>\n              <div class=\"profile-name\">Consumidor<\u002Fdiv>\n              <div class=\"profile-tagline\">Participa do que convém<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"profile-chevron\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M4 6l4 4 4-4\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"profile-summary\" style=\"text-align: justify\">Retiro sim, grupo de oração não. Vai em mais de uma igreja conforme a programação.<\u002Fp>\n          <div class=\"profile-detail\"><div class=\"profile-detail-inner\">\"Com todo respeito: a Igreja não é uma prateleira de mercado. Mas a Igreja não é minha nem sua — é do Cristo. Tem espaço pra você aqui também.\"<\u002Fdiv><\u002Fdiv>\n        <\u002Fbutton>\n\n      <\u002Fdiv>\n\n      <p class=\"body-text-sm\" style=\"text-align: center; line-height: 1.25\">Toque para escolher como você se reconhece hoje.<br>Sua seleção fica salva neste dispositivo.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- SCREEN 4 — O que nos une -->\n    <section class=\"screen\" data-screen=\"4\">\n      <div class=\"eyebrow\">Capítulo 3<\u002Fdiv>\n      <p class=\"pull-quote\" style=\"line-height: 1\">O que nos une aqui não são as mesmas crenças.&nbsp;\nMas o mesmo Cristo.\n<\u002Fp>\n\n      <p class=\"body-text\" style=\"text-align: justify\">Você pode discordar de doutrinas, de estilos, de práticas. Mas se o Cristo é o centro, nós nos encontraremos lá.<\u002Fp>\n\n      <div class=\"card-deep\">\n        <h3 class=\"sub\">Reflexão pastoral<\u002Fh3>\n        <p class=\"body-text\" style=\"margin: 0; font-family: var(--t-display); font-size: 18px; line-height: 1.2; color: var(--c-white); font-style: italic\">\"A Família em Cristo não é minha. Tenho o sagrado encargo de conduzi-la — mas não sou dono dela.\"<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"divider\"><\u002Fdiv>\n\n      <h3 class=\"sub\" style=\"text-align: center; font-size: 20px\">Pergunta sem certo ou errado<\u002Fh3>\n      <p class=\"body-text\" style=\"text-align: center; font-size: 13px\">O que mais te aproxima de uma comunidade de fé?<\u002Fp>\n\n      <div class=\"choices\" data-reflective=\"q4\">\n        <button class=\"choice\" data-fb=\"O ensino é a coluna que sustenta. Quando a Palavra entra com profundidade, o coração se reorganiza. Cuidado apenas para que o saber não vire vaidade — conhecimento sem amor incha.\"><span class=\"bullet\">A<\u002Fspan><span style=\"text-align: left\">O ensino. Quero entender a fé com profundidade.<\u002Fspan><\u002Fbutton>\n        <button class=\"choice\" data-fb=\"As pessoas são o tecido do Reino aqui na terra. Amizades espirituais sustentam fé em tempos secos. Cuidado para não confundir igreja com clube de afinidade — Cristo continua sendo o centro.\"><span class=\"bullet\">B<\u002Fspan><span>As pessoas. Preciso de irmãos que me amem.<\u002Fspan><\u002Fbutton>\n        <button class=\"choice\" data-fb=\"Propósito move pés. Servir junto cria vínculo que culto sozinho não cria. Cuidado para que a missão não substitua a comunhão — você é filho antes de ser obreiro.\"><span class=\"bullet\">C<\u002Fspan><span>O propósito. Quero servir e fazer parte de algo maior.<\u002Fspan><\u002Fbutton>\n        <button class=\"choice\" data-fb=\"A presença é o coração de tudo. Sem o Espírito, somos ONG religiosa. Cuidado para não procurar só a experiência — o Cristo bíblico é o mesmo da experiência, e a Palavra é o teste de todo encontro.\"><span class=\"bullet\">D<\u002Fspan><span>A presença de Deus. Vou onde Ele se manifesta.<\u002Fspan><\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"feedback\" data-fb-for=\"q4\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SCREEN 5 — Reunir -->\n    <section class=\"screen\" data-screen=\"5\">\n      <div class=\"eyebrow\">Ponto I · Hebreus 10<\u002Fdiv>\n      <h2 class=\"title\">Não deixe de se reunir<\u002Fh2>\n\n      <div class=\"verse\">\n        <p class=\"verse-text\" style=\"text-align: justify; line-height: 1.25\">\"Importemo-nos uns com os outros para nos incentivarmos ao amor e às boas obras. E não deixemos de nos reunir como igreja, segundo o costume de alguns…\"<\u002Fp>\n        <div class=\"verse-ref\">Hebreus 10.24-25<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"greek\">\n        <div class=\"greek-mark\">α<\u002Fdiv>\n        <div class=\"greek-body\">\n          <div class=\"greek-word\" style=\"font-size: 20px\">synagogé<\u002Fdiv>\n          <div class=\"greek-trans\" style=\"font-size: 12px\">συναγωγή · sinagoga, reunir-se, ajuntar-se<\u002Fdiv>\n          <div class=\"greek-mean\" style=\"text-align: justify; font-size: 14px\">Há algo que só acontece quando o corpo se reúne fisicamente. Presença não é opcional — é teologia.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"hero-art\" style=\"aspect-ratio:1.6/1; margin:8px 0 18px;\">\n        <svg viewBox=\"0 0 320 200\" width=\"100%\">\n          <ellipse cx=\"160\" cy=\"138\" rx=\"118\" ry=\"22\" fill=\"#EEEDFE\"><\u002Fellipse>\n          <rect x=\"60\" y=\"100\" width=\"200\" height=\"44\" rx=\"6\" fill=\"#534AB7\"><\u002Frect>\n          <rect x=\"60\" y=\"100\" width=\"200\" height=\"8\" rx=\"4\" fill=\"#26215C\"><\u002Frect>\n          <!-- chairs/people around -->\n          <g fill=\"#26215C\">\n            <circle cx=\"80\" cy=\"86\" r=\"10\"><\u002Fcircle><circle cx=\"120\" cy=\"80\" r=\"10\"><\u002Fcircle><circle cx=\"160\" cy=\"78\" r=\"10\"><\u002Fcircle><circle cx=\"200\" cy=\"80\" r=\"10\"><\u002Fcircle><circle cx=\"240\" cy=\"86\" r=\"10\"><\u002Fcircle>\n            <rect x=\"70\" y=\"96\" width=\"20\" height=\"6\" rx=\"2\"><\u002Frect><rect x=\"110\" y=\"92\" width=\"20\" height=\"6\" rx=\"2\"><\u002Frect><rect x=\"150\" y=\"90\" width=\"20\" height=\"6\" rx=\"2\"><\u002Frect><rect x=\"190\" y=\"92\" width=\"20\" height=\"6\" rx=\"2\"><\u002Frect><rect x=\"230\" y=\"96\" width=\"20\" height=\"6\" rx=\"2\"><\u002Frect>\n          <\u002Fg>\n          <g fill=\"#7F77DD\">\n            <circle cx=\"100\" cy=\"158\" r=\"9\"><\u002Fcircle><circle cx=\"160\" cy=\"162\" r=\"9\"><\u002Fcircle><circle cx=\"220\" cy=\"158\" r=\"9\"><\u002Fcircle>\n            <rect x=\"91\" y=\"166\" width=\"18\" height=\"6\" rx=\"2\"><\u002Frect><rect x=\"151\" y=\"170\" width=\"18\" height=\"6\" rx=\"2\"><\u002Frect><rect x=\"211\" y=\"166\" width=\"18\" height=\"6\" rx=\"2\"><\u002Frect>\n          <\u002Fg>\n        <\u002Fsvg>\n      <\u002Fdiv>\n\n      <div class=\"slider-wrap\">\n        <div class=\"slider-question\" style=\"text-align: center\">Com que frequência você se ausentou por escolha própria nos últimos 3 meses?<\u002Fdiv>\n        <div class=\"slider-rail\">\n          <div class=\"slider-track\"><\u002Fdiv>\n          <div class=\"slider-fill\" id=\"sliderFill\" style=\"width:0%;\"><\u002Fdiv>\n          <div class=\"slider-steps\" id=\"sliderSteps\">\n            <div class=\"slider-step\" data-step=\"0\"><\u002Fdiv>\n            <div class=\"slider-step\" data-step=\"1\"><\u002Fdiv>\n            <div class=\"slider-step\" data-step=\"2\"><\u002Fdiv>\n            <div class=\"slider-step\" data-step=\"3\"><\u002Fdiv>\n            <div class=\"slider-step\" data-step=\"4\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"slider-labels\">\n          <span>Nunca<\u002Fspan><span>1×<\u002Fspan><span>2×<\u002Fspan><span>3×<\u002Fspan><span>4+<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"slider-feedback\" id=\"sliderFb\" style=\"margin: 20px 0px 0px; height: 104px; text-align: center\">Escolha um nível para refletir sobre a sua presença.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"margin-top:18px;\">\n        <h3 class=\"sub\">Pergunta<\u002Fh3>\n        <p class=\"body-text\" style=\"margin-bottom: 14px; text-align: justify\">O que Paulo chama de <em>\"tudo em comum\"<\u002Fem> em Atos 2 é principalmente sobre:<\u002Fp>\n        <div class=\"choices\" data-quiz=\"q5\">\n          <button class=\"choice\" data-correct=\"false\" data-fb=\"A partilha material era consequência, não causa. O texto descreve uma igreja onde ninguém passava necessidade — mas o coração disso não era o dinheiro: era uma vida espiritual tão entrelaçada que o bem material seguia naturalmente.\"><span class=\"bullet\">A<\u002Fspan><span style=\"text-align: justify\">Sobre dividir bens e propriedades igualmente entre todos.<\u002Fspan><\u002Fbutton>\n          <button class=\"choice\" data-correct=\"true\" data-fb=\"Sim. Atos 2 descreve uma comunhão tão profunda — ensino, oração, partir do pão, reuniões diárias, simpatia mútua — que &lt;strong&gt;o tudo em comum começa no espírito&lt;/strong&gt;, e a generosidade material é apenas o transbordamento.\"><span class=\"bullet\">B<\u002Fspan><span style=\"text-align: justify\">Sobre uma vida comum tão entrelaçada que tudo passa a ser compartilhado — tempo, fé, mesa, propriedade.<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"feedback\" data-fb-for=\"q5\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SCREEN 6 — Panelinhas -->\n    <section class=\"screen\" data-screen=\"6\">\n      <div class=\"eyebrow\">Capítulo 4<\u002Fdiv>\n      <h2 class=\"title\">Panelinhas na igreja.<\u002Fh2>\n      <p class=\"body-text\" style=\"text-align: justify\">A questão não é <em>se<\u002Fem> existem grupos — é <em>o que<\u002Fem> esses grupos fazem.<\u002Fp>\n\n      <div class=\"twoside\">\n        <div class=\"side healthy\">\n          <div class=\"side-head\">\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#26215C\" stroke-width=\"1.8\"><path d=\"M12 21s-7-4.5-7-11a4 4 0 017-2.6A4 4 0 0119 10c0 6.5-7 11-7 11z\"><\u002Fpath><\u002Fsvg>\n            <div class=\"side-title\">Panelinhas saudáveis<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"chip-cloud\">\n            <span class=\"chip\">grupo de oração<\u002Fspan><span class=\"chip\">Estudo Bíblico<\u002Fspan><span class=\"chip\">milagres<\u002Fspan><span class=\"chip\">louvor<\u002Fspan><span class=\"chip\">pizza<\u002Fspan><span class=\"chip\">Crianças Juntas<\u002Fspan><span class=\"chip\">Amizades Espirituais<\u002Fspan><span class=\"chip\">Corrida<\u002Fspan><span class=\"chip\">viagem<\u002Fspan><span class=\"chip\">Doação de Sangue<\u002Fspan><span class=\"chip\">Aniversário<\u002Fspan><span class=\"chip\">enterro<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"side toxic\">\n          <div class=\"side-head\">\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#7A3A22\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M5.5 5.5l13 13\"><\u002Fpath><\u002Fsvg>\n            <div class=\"side-title\">Panelinhas tóxicas<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"chip-cloud\">\n            <span class=\"chip\">Fofoca<\u002Fspan><span class=\"chip\">maledicência<\u002Fspan><span class=\"chip\">Difamação<\u002Fspan><span class=\"chip\">Contenda<\u002Fspan><span class=\"chip\">Comparação<\u002Fspan><span class=\"chip\">Disputa do Ego<\u002Fspan><span class=\"chip\">narcisismo<\u002Fspan><span class=\"chip\">Divisão<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"body-text\" style=\"text-align: center; font-family: var(--t-display); font-style: italic; font-size: 17px; color: var(--c-deep); line-height: 1.3\">A diferença está na direção.<br>Uma te empurra para o Cristo e para o outro.<br>A outra te empurra para dentro de si mesmo.<\u002Fp>\n\n      <div class=\"verse\">\n        <p class=\"verse-text\" style=\"font-size: 22px; text-align: center\">\"Consideremos uns aos outros para nos estimularmos ao amor e à prática das boas obras.\"<\u002Fp>\n        <div class=\"verse-ref\" style=\"text-align: center\">Hebreus 10.24<\u002Fdiv>\n      <\u002Fdiv>\n\n      <h3 class=\"sub\">Gesto desta semana<\u002Fh3>\n      <p class=\"body-text\" style=\"text-align: justify\">Qual desses gestos você consegue fazer por alguém da sua comunidade?<\u002Fp>\n      <div class=\"gesture-list\" id=\"gestureList\">\n        <button class=\"gesture\" data-encourage=\"Um sofrimento dividido é um sofrimento partido ao meio. Sua visita pode ser o sermão mais profundo da semana — porque é a Palavra com pés.\">\n          <span class=\"gesture-mark\"><svg width=\"10\" height=\"10\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M4 8l3 3 5-6\" stroke=\"white\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          Visitar alguém doente\n        <\u002Fbutton>\n        <button class=\"gesture\" data-encourage=\"Lembrar do aniversário de alguém é dizer: você existe pra mim. E isso, num mundo distraído, é quase um milagre.\">\n          <span class=\"gesture-mark\"><svg width=\"10\" height=\"10\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M4 8l3 3 5-6\" stroke=\"white\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          Parabenizar um aniversariante\n        <\u002Fbutton>\n        <button class=\"gesture\" data-encourage=\"Orar com alguém presencialmente desarma máscaras. É colocar duas vozes diante do mesmo Pai e descobrir, no meio do caminho, que vocês são irmãos de verdade.\">\n          <span class=\"gesture-mark\"><svg width=\"10\" height=\"10\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M4 8l3 3 5-6\" stroke=\"white\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          Orar com alguém pessoalmente\n        <\u002Fbutton>\n        <button class=\"gesture\" data-encourage=\"Mesa é o lugar onde os disfarces caem. Comer junto, sem pauta, é talvez o ato mais bíblico que você pode fazer essa semana.\">\n          <span class=\"gesture-mark\"><svg width=\"10\" height=\"10\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M4 8l3 3 5-6\" stroke=\"white\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          Comer junto, sem pauta\n        <\u002Fbutton>\n        <button class=\"gesture\" data-encourage=\"Quando duas crianças brincam juntas, duas famílias começam a ser tecidas. Você está plantando vínculos que vão durar décadas.\">\n          <span class=\"gesture-mark\"><svg width=\"10\" height=\"10\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M4 8l3 3 5-6\" stroke=\"white\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          Levar as crianças para brincar juntas\n        <\u002Fbutton>\n        <button class=\"gesture\" data-encourage=\"Ir a um enterro é dizer: eu choro com quem chora. Em um país que evita a dor, sua presença ali prega o Evangelho sem dizer uma palavra.\" style=\"border-radius: 8px; width: 0px; height: 0px; opacity: 0; border-width: 0px\">Ir a um enterro/hospital<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"gesture-encourage\" id=\"gestureEnc\" style=\"height: 80px\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SCREEN 7 — Obedeça aos líderes -->\n    <section class=\"screen\" data-screen=\"7\">\n      <div class=\"eyebrow\">Ponto II · Hebreus 13<\u002Fdiv>\n      <h2 class=\"title\">Obedeça aos líderes<\u002Fh2>\n\n      <div class=\"verse\">\n        <p class=\"verse-text\" style=\"text-align: justify\">\"Obedeçam aos seus líderes e sejam submissos a eles, pois cuidam de vocês como quem deve prestar contas.\"<\u002Fp>\n        <div class=\"verse-ref\">Hebreus 13.17<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"greek\">\n        <div class=\"greek-mark\">β<\u002Fdiv>\n        <div class=\"greek-body\">\n          <div class=\"greek-word\">hupeikete<\u002Fdiv>\n          <div class=\"greek-trans\" style=\"font-size: 12px; text-align: justify\">ὑπείκετε · ceder, dispor-se, seguir com discernimento<\u002Fdiv>\n          <div class=\"greek-mean\" style=\"text-align: justify\">Não é obediência cega. É a atitude de quem cede porque confia — e confia porque examina.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card-deep\">\n        <h3 class=\"sub\">Distinção fundamental<\u002Fh3>\n        <p class=\"body-text\" style=\"color: var(--c-white); margin: 0; font-size: 15.5px; text-align: justify\">O pastor não tem autoridade <em>sobre<\u002Fem> você. Ele tem autoridade <em>da Palavra<\u002Fem> que passa por ele.<\u002Fp>\n        <p class=\"body-text\" style=\"color: rgba(238,237,254,.85); margin: 10px 0 0; font-size: 14px; text-align: justify\">Quando a Palavra passa, você segue. Quando é a pessoa falando, você avalia.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"margin-top:14px;\">\n        <h3 class=\"sub\" style=\"font-size: 14px\">ESTRUTURA NA FAMÍLIA EM CRISTO:<\u002Fh3>\n        <p class=\"body-text\" style=\"margin: 0; text-align: justify; font-size: 14px\">Aqui existe um órgão máximo: a Assembleia Constituinte. Ela governa inclusive a liderança. Nós, enquanto liderança, também nos submetemos à Igreja.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"card-lilac\" style=\"margin-top:14px;\">\n        <h3 class=\"sub\">Alerta pastoral<\u002Fh3>\n        <p class=\"body-text\" style=\"color: var(--c-deep); margin: 0; font-family: var(--t-display); font-style: italic; font-size: 16px; line-height: 1.4; text-align: justify\">\"Quem vive com a própria consciência como critério último e exclusivo da verdade vive sozinho. Não presta contas a ninguém, não reconhece autoridade de ninguém. E às vezes é por isso que deixa de se reunir como Igreja.\"<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"margin-top:16px;\">\n        <h3 class=\"sub\">Pergunta<\u002Fh3>\n        <p class=\"body-text\" style=\"margin-bottom:14px;\">Se um líder está agindo de forma contrária à Palavra de Deus, o que Jesus ensina em Mateus 18?<\u002Fp>\n        <div class=\"choices\" data-quiz=\"q7\">\n          <button class=\"choice\" data-correct=\"false\" data-fb=\"Sair calado preserva a sua paz aparente, mas abandona o irmão (que é o líder) e fragiliza a comunidade. Jesus pede algo mais incômodo — e mais amoroso.\"><span class=\"bullet\">A<\u002Fspan><span>Sair em silêncio e procurar outra igreja.<\u002Fspan><\u002Fbutton>\n          <button class=\"choice\" data-correct=\"true\" data-fb=\"Sim. Mateus 18 é uma escada: &lt;strong&gt;conversa pessoal primeiro&lt;/strong&gt;; se não ouvir, leva uma ou duas testemunhas; se ainda não ouvir, leva à igreja. É confronto, mas é confronto fraterno — com pés, café e tempo.\"><span class=\"bullet\">B<\u002Fspan><span>Ir até ele a sós, conversar. Se não ouvir, levar uma ou duas testemunhas. Se persistir, levar à igreja.<\u002Fspan><\u002Fbutton>\n          <button class=\"choice\" data-correct=\"false\" data-fb=\"Expor publicamente sem antes conversar pula etapas que Jesus mandou cumprir. Pode parecer corajoso, mas geralmente nasce mais do ego ferido do que do amor pelo irmão.\"><span class=\"bullet\">C<\u002Fspan><span>Expor publicamente nas redes sociais como denúncia profética.<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"feedback\" data-fb-for=\"q7\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SCREEN 8 — Lembre-se dos líderes -->\n    <section class=\"screen\" data-screen=\"8\">\n      <div class=\"eyebrow\">Capítulo 5 · Hebreus 13.7<\u002Fdiv>\n      <h2 class=\"title\">Lembre-se dos seus líderes<\u002Fh2>\n\n      <div class=\"verse\">\n        <p class=\"verse-text\" style=\"text-align: justify\">\"Lembrem-se dos seus líderes, que transmitiram a palavra de Deus a vocês. Observem bem o resultado do estilo de vida deles e imitem a sua fé.\"<\u002Fp>\n        <div class=\"verse-ref\">Hebreus 13.7<\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"body-text\" style=\"text-align: justify\">A obediência ao líder começa pela memória. Você se lembra de quem plantou fé em você? De quem transmitiu a Palavra no momento certo?<\u002Fp>\n\n      <div class=\"card\">\n        <label class=\"field-label\" for=\"heritageName\">Escreva o nome de alguém<\u002Flabel>\n        <p class=\"body-text-sm\" style=\"margin-bottom:10px;\">…que transmitiu a Palavra de Deus a você em um momento decisivo.<\u002Fp>\n        <div class=\"inline-confirm\">\n          <input class=\"input\" id=\"heritageName\" type=\"text\" placeholder=\"Nome dessa pessoa\" autocomplete=\"off\">\n          <button class=\"btn-mini\" id=\"heritageConfirm\">Confirmar<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"heritage-msg\" id=\"heritageMsg\">\n          \"Essa pessoa é parte da sua herança espiritual. E você é parte da herança de alguém também.\"\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\" style=\"margin-top:12px;\">\n        <label class=\"field-label\" for=\"heritageGift\">O que essa pessoa te deixou?<\u002Flabel>\n        <p class=\"body-text-sm\" style=\"margin-bottom:10px;\">Pode ser uma frase, um gesto, uma postura, uma cicatriz transformada.<\u002Fp>\n        <textarea class=\"textarea\" id=\"heritageGift\" placeholder=\"Escreva aqui…\"><\u002Ftextarea>\n      <\u002Fdiv>\n\n      <p class=\"body-text-sm\" style=\"text-align:center; margin-top:14px;\">Suas respostas são pessoais. Nós não teremos acesso.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- SCREEN 9 — Passaporte -->\n    <section class=\"screen\" data-screen=\"9\">\n      <div class=\"eyebrow\">DECISÕES<\u002Fdiv>\n      <h2 class=\"title\">Passaporte da Família<\u002Fh2>\n      <p class=\"body-text\" style=\"line-height: 1.2\">Um documento íntimo. Ninguém vai ver. &nbsp;\nMas você vai se lembrar.\n\n<\u002Fp>\n\n      <div class=\"passport\">\n        <div class=\"passport-header\">\n          <div>\n            <p class=\"passport-title\">Família em Cristo<\u002Fp>\n            <div class=\"passport-sub\" style=\"font-size: 11px\">São Luís · MA · 2026<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"passport-stamp\" style=\"font-size: 12px\">Passaporte<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"passport-fields\">\n          <div>\n            <div class=\"passport-field-label\">Nome<\u002Fdiv>\n            <input class=\"input\" id=\"pNome\" type=\"text\" placeholder=\"Como você se chama\" autocomplete=\"off\">\n          <\u002Fdiv>\n          <div>\n            <div class=\"passport-field-label\">Perfil honesto hoje<\u002Fdiv>\n            <select class=\"select\" id=\"pPerfilHoje\">\n              <option value=\"\">Selecione<\u002Foption>\n              <option>Membro<\u002Foption><option>Frequentador<\u002Foption><option>Visitante<\u002Foption><option>Consumidor<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <div>\n            <div class=\"passport-field-label\">Perfil que quero ser em 1 ano<\u002Fdiv>\n            <select class=\"select\" id=\"pPerfilFuturo\">\n              <option value=\"\">Selecione<\u002Foption>\n              <option>Membro<\u002Foption><option>Frequentador<\u002Foption><option>Visitante<\u002Foption><option>Consumidor<\u002Foption><option>Parte de um grupo menor<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <div>\n            <div class=\"passport-field-label\">Pessoa para reconectar<\u002Fdiv>\n            <input class=\"input\" id=\"pPessoa\" type=\"text\" placeholder=\"Nome de alguém da igreja\" autocomplete=\"off\">\n          <\u002Fdiv>\n          <div>\n            <div class=\"passport-field-label\">Um gesto concreto esta semana<\u002Fdiv>\n            <textarea class=\"textarea\" id=\"pGesto\" placeholder=\"Escreva o gesto que você vai fazer…\"><\u002Ftextarea>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"passport-footer\" style=\"text-align: center; line-height: 1.25;\">Este documento é seu. Ninguém vai ver.&nbsp;&nbsp;\nMas você vai se lembrar.\n<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SCREEN 10 — Conclusão -->\n    <section class=\"screen\" data-screen=\"10\">\n      <div class=\"eyebrow\">Conclusão<\u002Fdiv>\n      <p class=\"pull-quote\">Essa Igreja <span class=\"em\">não é minha.<\u002Fspan> Não é sua. <span class=\"em\">É do Cristo.<\u002Fspan><\u002Fp>\n      <p class=\"body-text\" style=\"text-align: justify\">Todos nós temos o sagrado encargo de cuidar dela.<\u002Fp>\n\n      <h3 class=\"sub\" style=\"margin-top:22px; font-size: 24px;\">O sermão em seis passos:<\u002Fh3>\n      <div class=\"vtl\">\n        <div class=\"vtl-item\"><div class=\"vtl-num\">1<\u002Fdiv><div class=\"vtl-body\"><strong>Você já pertence<\u002Fstrong> a uma família. A questão é o nível.<\u002Fdiv><\u002Fdiv>\n        <div class=\"vtl-item\"><div class=\"vtl-num\">2<\u002Fdiv><div class=\"vtl-body\">A <strong>Igreja local<\u002Fstrong> existe para este tempo e esta realidade.<\u002Fdiv><\u002Fdiv>\n        <div class=\"vtl-item\"><div class=\"vtl-num\">3<\u002Fdiv><div class=\"vtl-body\"><strong>Presença física<\u002Fstrong> não é opcional.<\u002Fdiv><\u002Fdiv>\n        <div class=\"vtl-item\"><div class=\"vtl-num\">4<\u002Fdiv><div class=\"vtl-body\"><strong>Panelinhas saudáveis<\u002Fstrong> são necessárias.<\u002Fdiv><\u002Fdiv>\n        <div class=\"vtl-item\"><div class=\"vtl-num\">5<\u002Fdiv><div class=\"vtl-body\">Confiar na liderança não é ingenuidade — é <strong>humildade discernente<\u002Fstrong>.<\u002Fdiv><\u002Fdiv>\n        <div class=\"vtl-item\"><div class=\"vtl-num\">6<\u002Fdiv><div class=\"vtl-body\">O que nós une é <strong>o mesmo Cristo<\u002Fstrong>.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <h3 class=\"sub\" style=\"margin-top:22px;\">Compromissos<\u002Fh3>\n      <div class=\"commit-list\" id=\"commitList\">\n        <button class=\"commit\"><span class=\"checkbox\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M3 8l4 4 6-8\" stroke=\"white\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>Vou me aproximar de pessoas para construir afinidades.<\u002Fbutton>\n        <button class=\"commit\"><span class=\"checkbox\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M3 8l4 4 6-8\" stroke=\"white\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>Vou mandar mensagem para a pessoa que escrevi o nome no passaporte.<\u002Fbutton>\n        <button class=\"commit\"><span class=\"checkbox\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M3 8l4 4 6-8\" stroke=\"white\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>Vou conversar com a liderança sobre minha caminhada.<\u002Fbutton>\n        <button class=\"commit\"><span class=\"checkbox\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M3 8l4 4 6-8\" stroke=\"white\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>Vou participar de um gesto concreto de serviço a comunidade essa semana.<\u002Fbutton>\n        <button class=\"commit\"><span class=\"checkbox\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M3 8l4 4 6-8\" stroke=\"white\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>Quero saber mais sobre batismo nas águas.<\u002Fbutton>\n        <button class=\"commit\"><span class=\"checkbox\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M3 8l4 4 6-8\" stroke=\"white\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>Vou simplesmente voltar no próximo domingo.<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div class=\"score-card\">\n        <div class=\"score-number\" id=\"scoreNum\">—<\u002Fdiv>\n        <div class=\"score-label\">de 3 perguntas teológicas<\u002Fdiv>\n        <div class=\"score-msg\" id=\"scoreMsg\">Responda as perguntas das telas 2, 5 e 7 para ver sua reflexão.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"pull-quote\" style=\"font-size: 24px; margin-top: 24px; text-align: center\">Que Deus toque seu coração.\nE que você faça parte da família Dele.\n\n<\u002Fp>\n\n      <div class=\"divider-fancy\">· Obrigado ·<\u002Fdiv>\n      <p class=\"body-text-sm\" style=\"text-align:center;\">Família em Cristo · São Luís<br>Pastor Lucas Cavalcanti · 2026<\u002Fp>\n    <\u002Fsection>\n\n  <\u002Fmain>\n\n  <!-- FOOTER NAV -->\n  <footer class=\"footer\">\n    <button class=\"btn btn-icon\" id=\"btnPrev\" aria-label=\"Voltar\">\n      <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M15 6l-6 6 6 6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n    <button class=\"btn btn-primary\" id=\"btnNext\">\n      <span id=\"btnNextLabel\">Começar<\u002Fspan>\n      <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M9 6l6 6-6 6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<script>\n(function(){\n  const STORE_KEY = 'fec-sermon-app-v1';\n  const TOTAL = 10;\n\n  // --- state ---\n  const state = loadState();\n\n  function loadState(){\n    try{\n      const raw = localStorage.getItem(STORE_KEY);\n      if(raw) return Object.assign(defaults(), JSON.parse(raw));\n    }catch(e){}\n    return defaults();\n  }\n  function defaults(){\n    return {\n      cur:1,\n      profile:null,\n      reflective:null,\n      quiz:{}, // q2,q5,q7 -> bool\n      slider:null,\n      gestures:[],\n      heritage:{name:'', gift:''},\n      passport:{nome:'', perfilHoje:'', perfilFuturo:'', pessoa:'', gesto:''},\n      commits:[]\n    };\n  }\n  function save(){\n    try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}\n  }\n\n  // --- navigation ---\n  const screens = document.querySelectorAll('.screen');\n  const fill = document.getElementById('progressFill');\n  const stepCur = document.getElementById('stepCur');\n  const stepTot = document.getElementById('stepTot');\n  const btnPrev = document.getElementById('btnPrev');\n  const btnNext = document.getElementById('btnNext');\n  const btnNextLabel = document.getElementById('btnNextLabel');\n  stepTot.textContent = String(TOTAL).padStart(2,'0');\n\n  function go(n, dir){\n    n = Math.max(1, Math.min(TOTAL, n));\n    dir = dir || (n > state.cur ? 1 : -1);\n    const current = document.querySelector('.screen.active');\n    const next = document.querySelector('.screen[data-screen=\"'+n+'\"]');\n    if(!next || current === next) return;\n\n    if(current){\n      current.classList.remove('active');\n      current.classList.add('exit-left');\n      // reset transform direction\n      if(dir < 0){\n        current.style.transform = 'translateX(40px)';\n      }\n      setTimeout(()=>{ current.classList.remove('exit-left'); current.style.transform=''; }, 450);\n    }\n    next.style.transform = (dir < 0 ? 'translateX(-40px)' : 'translateX(40px)');\n    requestAnimationFrame(()=>{\n      next.classList.add('active');\n      next.style.transform = '';\n      next.scrollTop = 0;\n    });\n\n    state.cur = n;\n    updateChrome();\n    if(n === 10) refreshScore();\n    save();\n  }\n\n  function updateChrome(){\n    fill.style.width = ((state.cur)/TOTAL*100) + '%';\n    stepCur.textContent = String(state.cur).padStart(2,'0');\n    btnPrev.disabled = state.cur === 1;\n    if(state.cur === 1) btnNextLabel.textContent = 'Começar';\n    else if(state.cur === TOTAL) btnNextLabel.textContent = 'Recomeçar';\n    else btnNextLabel.textContent = 'Avançar';\n  }\n  btnPrev.addEventListener('click', ()=> go(state.cur - 1, -1));\n  btnNext.addEventListener('click', ()=>{\n    if(state.cur === TOTAL){ go(1, -1); return; }\n    go(state.cur + 1, 1);\n  });\n  // keyboard\n  document.addEventListener('keydown', (e)=>{\n    if(e.target.matches('input, textarea, select')) return;\n    if(e.key === 'ArrowRight') btnNext.click();\n    if(e.key === 'ArrowLeft') btnPrev.click();\n  });\n\n  // --- quiz logic (multiple choice with feedback) ---\n  document.querySelectorAll('[data-quiz]').forEach(group => {\n    const key = group.dataset.quiz;\n    const fbEl = document.querySelector('.feedback[data-fb-for=\"'+key+'\"]');\n    group.querySelectorAll('.choice').forEach(btn => {\n      btn.addEventListener('click', ()=>{\n        if(group.dataset.answered === '1') return;\n        group.dataset.answered = '1';\n        const isCorrect = btn.dataset.correct === 'true';\n        state.quiz[key] = isCorrect;\n        group.querySelectorAll('.choice').forEach(b => {\n          b.classList.add('dim');\n          if(b.dataset.correct === 'true') b.classList.add('correct');\n        });\n        btn.classList.remove('dim');\n        if(isCorrect){\n          btn.classList.add('correct');\n        } else {\n          btn.classList.add('incorrect');\n          btn.classList.add('shake');\n        }\n        fbEl.innerHTML = btn.dataset.fb;\n        fbEl.classList.add('show');\n        save();\n      });\n    });\n    // restore\n    if(key in state.quiz){\n      const wasCorrect = state.quiz[key];\n      let selected = null;\n      group.querySelectorAll('.choice').forEach(b => {\n        if(b.dataset.correct === 'true') b.classList.add('correct');\n        b.classList.add('dim');\n      });\n      // we can't know which choice they picked, so show correct answer's feedback\n      const correctBtn = group.querySelector('.choice[data-correct=\"true\"]');\n      if(correctBtn){\n        correctBtn.classList.remove('dim');\n        fbEl.innerHTML = wasCorrect ? correctBtn.dataset.fb : 'Você respondeu anteriormente. Resposta correta destacada acima.';\n        fbEl.classList.add('show');\n      }\n      group.dataset.answered = '1';\n    }\n  });\n\n  // --- reflective (screen 4): no right/wrong ---\n  document.querySelectorAll('[data-reflective]').forEach(group => {\n    const key = group.dataset.reflective;\n    const fbEl = document.querySelector('.feedback[data-fb-for=\"'+key+'\"]');\n    group.querySelectorAll('.choice').forEach(btn => {\n      btn.addEventListener('click', ()=>{\n        group.querySelectorAll('.choice').forEach(b => b.classList.remove('selected'));\n        btn.classList.add('selected');\n        fbEl.innerHTML = btn.dataset.fb;\n        fbEl.classList.add('show');\n        state.reflective = btn.textContent.trim();\n        save();\n      });\n    });\n  });\n\n  // --- profile cards (screen 3) ---\n  document.querySelectorAll('.profile-card').forEach(card => {\n    card.addEventListener('click', ()=>{\n      const all = document.querySelectorAll('.profile-card');\n      if(state.profile === card.dataset.profile){\n        card.classList.remove('selected');\n        state.profile = null;\n      } else {\n        all.forEach(c => c.classList.remove('selected'));\n        card.classList.add('selected');\n        state.profile = card.dataset.profile;\n        // also prefill passport\n        const sel = document.getElementById('pPerfilHoje');\n        if(sel && !sel.value) sel.value = state.profile;\n        state.passport.perfilHoje = state.passport.perfilHoje || state.profile;\n      }\n      save();\n    });\n    if(state.profile === card.dataset.profile) card.classList.add('selected');\n  });\n\n  // --- slider (screen 5) ---\n  const sliderSteps = document.querySelectorAll('#sliderSteps .slider-step');\n  const sliderFill = document.getElementById('sliderFill');\n  const sliderFb = document.getElementById('sliderFb');\n  const SLIDER_MSGS = [\n    'Nunca — bom. Mas cuidado: presença sem coração também é ausência. O contrário de faltar não é só estar — é estar inteiro.',\n    'Uma vez. Pode ter sido a vida acontecendo. Mas observe o padrão: o domingo perdido tende a virar costume com surpreendente facilidade.',\n    'Duas vezes. A pergunta importa: você sentiu falta? Se não sentiu, é hora de olhar pra dentro. O corpo só percebe que é corpo quando se reúne.',\n    'Três vezes. Em três meses, você passou mais tempo fora do que com a comunidade no domingo. A presença não é controle — é remédio. Você está se medicando?',\n    'Quatro ou mais. Conversa difícil agora: você ainda se considera parte dessa Igreja? Sem julgamento — só convite. Talvez seja hora de chamar alguém pra um café e conversar de verdade.'\n  ];\n  sliderSteps.forEach((s, i) => {\n    s.addEventListener('click', ()=>{\n      setSlider(i);\n      state.slider = i;\n      save();\n    });\n  });\n  function setSlider(i){\n    sliderSteps.forEach((s, idx) => {\n      s.classList.toggle('active', idx === i);\n      s.classList.toggle('passed', idx < i);\n    });\n    sliderFill.style.width = (i/(sliderSteps.length-1)*100) + '%';\n    sliderFb.textContent = SLIDER_MSGS[i];\n  }\n  if(state.slider != null) setSlider(state.slider);\n\n  // --- gestures (screen 6) ---\n  const gestureEnc = document.getElementById('gestureEnc');\n  document.querySelectorAll('.gesture').forEach(g => {\n    g.addEventListener('click', ()=>{\n      const txt = g.textContent.trim();\n      const idx = state.gestures.indexOf(txt);\n      if(idx >= 0){\n        state.gestures.splice(idx, 1);\n        g.classList.remove('picked');\n      } else {\n        state.gestures.push(txt);\n        g.classList.add('picked');\n      }\n      if(state.gestures.length){\n        gestureEnc.textContent = g.dataset.encourage;\n        gestureEnc.classList.add('show');\n      } else {\n        gestureEnc.classList.remove('show');\n      }\n      save();\n    });\n    if(state.gestures.indexOf(g.textContent.trim()) >= 0) g.classList.add('picked');\n  });\n\n  // --- heritage (screen 8) ---\n  const heritageName = document.getElementById('heritageName');\n  const heritageGift = document.getElementById('heritageGift');\n  const heritageMsg = document.getElementById('heritageMsg');\n  const heritageConfirm = document.getElementById('heritageConfirm');\n  heritageName.value = state.heritage.name || '';\n  heritageGift.value = state.heritage.gift || '';\n  if(state.heritage.name) heritageMsg.classList.add('show');\n  heritageConfirm.addEventListener('click', ()=>{\n    state.heritage.name = heritageName.value.trim();\n    save();\n    if(state.heritage.name){\n      heritageMsg.classList.remove('show');\n      void heritageMsg.offsetWidth;\n      heritageMsg.classList.add('show');\n    }\n  });\n  heritageName.addEventListener('keypress', e=>{ if(e.key==='Enter'){ e.preventDefault(); heritageConfirm.click(); }});\n  heritageGift.addEventListener('input', ()=>{ state.heritage.gift = heritageGift.value; save(); });\n\n  // --- passport (screen 9) ---\n  const pFields = ['pNome:nome','pPerfilHoje:perfilHoje','pPerfilFuturo:perfilFuturo','pPessoa:pessoa','pGesto:gesto'];\n  pFields.forEach(pair => {\n    const [id, key] = pair.split(':');\n    const el = document.getElementById(id);\n    el.value = state.passport[key] || '';\n    el.addEventListener('input', ()=>{\n      state.passport[key] = el.value;\n      save();\n    });\n    el.addEventListener('change', ()=>{\n      state.passport[key] = el.value;\n      save();\n    });\n  });\n\n  // --- commitments (screen 10) ---\n  document.querySelectorAll('.commit').forEach((c, i) => {\n    c.addEventListener('click', ()=>{\n      c.classList.toggle('checked');\n      const isOn = c.classList.contains('checked');\n      const idx = state.commits.indexOf(i);\n      if(isOn && idx < 0) state.commits.push(i);\n      if(!isOn && idx >= 0) state.commits.splice(idx, 1);\n      save();\n    });\n    if(state.commits.indexOf(i) >= 0) c.classList.add('checked');\n  });\n\n  // --- score (screen 10) ---\n  const SCORE_MSGS = {\n    0: 'Tudo bem não acertar. As perguntas não eram para medir conhecimento — eram para abrir conversa. Volte um dia, sem pressa, e deixe a Palavra te ler de volta.',\n    1: 'Uma acertada. Você está no caminho. A teologia não é prova de vestibular — é uma vida. Continue caminhando.',\n    2: 'Duas de três. Você ouviu com atenção. Agora a parte mais difícil: viver o que foi ouvido em casa, no trabalho, na mesa.',\n    3: 'Três de três. Conhecimento é bom — encarnação é melhor. A pergunta agora não é \"você entendeu?\", mas \"quem da sua comunidade vai sentir isso na pele essa semana?\"'\n  };\n  function refreshScore(){\n    const answered = ['q2','q5','q7'].filter(k => k in state.quiz);\n    const correct = answered.filter(k => state.quiz[k]).length;\n    const scoreNum = document.getElementById('scoreNum');\n    const scoreMsg = document.getElementById('scoreMsg');\n    if(answered.length === 0){\n      scoreNum.textContent = '—';\n      scoreMsg.textContent = 'Responda as perguntas das telas 2, 5 e 7 para ver sua reflexão.';\n    } else {\n      scoreNum.textContent = correct + '/' + answered.length;\n      scoreMsg.textContent = SCORE_MSGS[correct] || SCORE_MSGS[0];\n    }\n  }\n\n  // initial\n  updateChrome();\n  // restore which screen\n  if(state.cur > 1){\n    const target = document.querySelector('.screen[data-screen=\"'+state.cur+'\"]');\n    document.querySelector('.screen.active').classList.remove('active');\n    target.classList.add('active');\n    if(state.cur === 10) refreshScore();\n  }\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
